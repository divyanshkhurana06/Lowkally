# Render Blueprint — FREE tier (no paid plan). Card may still be required for verification only.
# Prefer Vercel + Cloud Run for hackathon: see scripts/deploy-vercel-gcp.sh

services:
  - type: web
    name: lowkally-agent
    runtime: docker
    dockerfilePath: forge/agent/Dockerfile
    dockerContext: forge
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: FORGE_WORKSPACE
        value: /data/workspace
      - key: FORGE_DATA_DIR
        value: /data/db
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GITLAB_PERSONAL_ACCESS_TOKEN
        sync: false
      - key: GITLAB_API_URL
        value: https://gitlab.com/api/v4
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITLAB_CLIENT_ID
        sync: false
      - key: GITLAB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_ISSUES_URL
        value: https://github.com/divyanshkhurana06/Lowkally/issues
      - key: GITHUB_ISSUES_TOKEN
        sync: false

  - type: web
    name: lowkally-ui
    runtime: docker
    dockerfilePath: forge/frontend/Dockerfile
    dockerContext: forge/frontend
    plan: free
    envVars:
      - key: API_URL
        fromService:
          name: lowkally-agent
          type: web
          property: host
      - key: NODE_ENV
        value: production
